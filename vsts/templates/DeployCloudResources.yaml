steps:
- task: AzureCLI@2
  name: deployCloudTestResources 
  inputs:
    azureSubscription: 'iot hub sdk service connection'
    scriptType: 'pscore'
    scriptLocation: 'inlineScript'
    pwsh: true
    inlineScript: |
      $jsonContent = az account show | ConvertFrom-Json
      $subscriptionId = $jsonContent.Id

      $uniqueSuffixLength = 5
      $characters = 'abcdefghijklmnopqrstuvwxyz'.ToCharArray()
      $CloudResourceUniqueSuffix = -join ($characters | Get-Random -Count $uniqueSuffixLength)

      $resourceGroupName = 'dotnetsdkgate'+$CloudResourceUniqueSuffix

      # Create a unique deployment name
      $randomSuffix = -join ((65..90) + (97..122) | Get-Random -Count 5 | ForEach-Object { [char]$_ })
      $deploymentName = "DotnetSDKE2eInfra-$randomSuffix"

      Write-Host "##vso[task.setvariable variable=RESOURCE_GROUP_NAME;isOutput=true]$resourceGroupName"
      Write-Host "##vso[task.setvariable variable=DEPLOYMENT_NAME;isOutput=true]$deploymentName"

      $(Build.SourcesDirectory)/e2e/Tests/prerequisites/e2eTestsSetup.ps1 -SubscriptionId $subscriptionId -Region westcentralus -ResourceGroup $resourceGroupName -GroupCertificatePassword someCertPass -TestCertificateOutputLocation $(Pipeline.Workspace)/test-certificates -DeploymentName $deploymentName

- publish:  $(Pipeline.Workspace)
  displayName: 'save test certificates locally'
  artifact: test-certificates